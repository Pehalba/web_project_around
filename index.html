<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Pedro Alba" />
    <meta name="description" content="Sprint 7." />
    <meta name="keywords" content="css, html, javascript" />

    <title>Tripleten Project Around</title>
    <link rel="stylesheet" href="./pages/index.css" />
  </head>

  <!--sprint 7-->
  <body>
    <div class="page">
      <header class="header">
        <h1 class="header__title">Around</h1>
        <p class="header__text">The U.S.</p>
      </header>
      <main>
        <div class="profile">
          <img
            class="profile__photo"
            src="./images/Profile_photo.jpg"
            alt="Profile_photo"
          />
          <div class="profile__layout">
            <div class="profile__info">
              <div>
                <h2 class="profile__name">Jacques Cousteau</h2>
                <p class="profile__description">Explorador</p>
              </div>
              <button class="profile__button-edit">
                <img class="profile__button_image" src="./images/edit.png" />
              </button>
            </div>

            <button class="profile__button-add">
              <img src="./images/+.png" />
            </button>
          </div>
        </div>

        <!--feed-->
        <section class="feed"></section>
        <template class="info__template">
          <div class="feed__card">
            <img
              class="delete-button"
              src="./images/Trash.svg"
              salt="Excluir
          cartão"
            />
            <img class="feed__photo" src="" alt="" />

            <div class="feed__info">
              <h2 class="feed__text"></h2>
              <img
                class="feed_like-button feed_like-button-desactived"
                src="./images/like.svg"
                alt="botão curtir"
              />
            </div>
          </div>
        </template>
      </main>

      <!-- POPUP EDIT PROFILE -->
      <div class="popup">
        <div class="popup__card">
          <button class="popup__button-close popup__button-close">
            <img src="./images/Close Icon.png" />
          </button>

          <form class="popup__form">
            <fieldset class="popup__fieldset">
              <h3 class="popup__title">Editar perfil</h3>

              <label class="popup__label">
                <input
                  type="text"
                  class="popup__name"
                  placeholder="nome"
                  required
                />
              </label>

              <label class="popup__label">
                <input
                  type="text"
                  class="popup__job"
                  placeholder="Sobre mim"
                  required
                />
              </label>

              <button type="submit" class="popup__button-save">
                <h3 class="popup__button-text">Salvar</h3>
              </button>
            </fieldset>
          </form>
        </div>
      </div>

      <!-- POPUP ADD PHOTO -->
      <div class="popup popup_add">
        <div class="popup__card">
          <button class="popup__button-close popup__button-close-add">
            <img src="./images/Close Icon.png" />
          </button>

          <form class="popup__form">
            <fieldset class="popup__fieldset">
              <h3 class="popup__title">New place</h3>

              <label class="popup__label">
                <input
                  type="text"
                  class="popup__name"
                  placeholder="title"
                  required
                />
              </label>

              <label class="popup__label">
                <input
                  type="text"
                  class="popup__job popup__link"
                  placeholder="Image url"
                  required
                />
              </label>

              <button type="submit" class="popup__button-save">
                <h3 class="popup__button-text">Salvar</h3>
              </button>
            </fieldset>
          </form>
        </div>
      </div>

      <!-- POPUP PHOTO -->
      <div class="popup popup_add-photo">
        <div class="popup__card-photo">
          <button class="popup__button-closes">
            <img
              class="popup__button-closes-photo"
              src="./images/Close Icon.png"
            />
          </button>
          <img class="popup__photo-img" src="" alt="Imagem ampliada" />

          <p class="popup__text-city"></p>
        </div>
      </div>

      <footer>
        <p class="footer__text">© 2024 Around The U.S.</p>
      </footer>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
