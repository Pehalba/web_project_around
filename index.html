<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Pedro Alba" />
    <meta name="description" content="Sprint 7." />
    <meta name="keywords" content="css, html, javascript" />

    <title>Tripleten Project Around</title>
    <link rel="stylesheet" href="./pages/index.css" />
  </head>

  <!--sprint 7-->
  <body>
    <div class="page">
      <header class="header">
        <h1 class="header__title">Around</h1>
        <p class="header__text">The U.S.</p>
      </header>
      <main>
        <div class="profile">
          <img
            class="profile__photo"
            src="./images/Profile_photo.jpg"
            alt="Profile_photo"
          />
          <div class="profile__layout">
            <div class="profile__info">
              <div>
                <h2 class="profile__name">Jacques Cousteau</h2>
                <p class="profile__description">Explorador</p>
              </div>
              <button class="profile__button-edit">
                <img class="profile__button_image" src="./images/edit.png" />
              </button>
            </div>

            <button class="profile__button-add">
              <img src="./images/+.png" />
            </button>
          </div>
        </div>

        <!--feed-->
        <section class="feed">
          <div class="feed__card">
            <img
              class="feed__photo"
              src="./images/1.jpg"
              alt="paisagem do Vale de Yosemite"
            />
            <div class="feed__info">
              <h2 class="feed__text">Vale de Yosemite</h2>
              <img
                class="feed_like-button"
                src="./images/like.svg"
                alt="botão curtir"
              />
            </div>
          </div>

          <div class="feed__card">
            <img
              class="feed__photo"
              src="./images/2.png"
              alt="paisagem do Lago Louise"
            />
            <div class="feed__info">
              <h2 class="feed__text">Lago Louise</h2>
              <img
                class="feed_like-button"
                src="./images/like.svg"
                alt="botão curtir"
              />
            </div>
          </div>

          <div class="feed__card">
            <img
              class="feed__photo"
              src="./images/3.png"
              alt="paisagem das Montanhas Care"
            />
            <div class="feed__info">
              <h2 class="feed__text">Montanhas Carecas</h2>
              <img
                class="feed_like-button"
                src="./images/like.svg"
                alt="botão curtir"
              />
            </div>
          </div>

          <div class="feed__card">
            <img
              class="feed__photo"
              src="./images/4.png"
              alt="paisagem do Latemar"
            />
            <div class="feed__info">
              <h2 class="feed__text">Latemar</h2>
              <img
                class="feed_like-button"
                src="./images/like.svg"
                alt="botão curtir"
              />
            </div>
          </div>

          <div class="feed__card">
            <img
              class="feed__photo"
              src="./images/5.png"
              alt="paisagem do Parque Nacional da Vanoise"
            />
            <div class="feed__info">
              <h2 class="feed__text">Parque Nacional da Vanoise</h2>
              <img
                class="feed_like-button"
                src="./images/like.svg"
                alt="botão curtir"
              />
            </div>
          </div>

          <div class="feed__card">
            <img
              class="feed__photo"
              src="./images/6.png"
              alt="paisagem do Lago di Braies"
            />
            <div class="feed__info">
              <h2 class="feed__text">Lago di Braies</h2>
              <img
                class="feed_like-button"
                src="./images/like.svg"
                alt="botão curtir"
              />
            </div>
          </div>
        </section>
      </main>

      <!-- POPUP EDIT PROFILE -->
      <div class="popup">
        <div class="popup__card">
          <button class="popup__button-close">
            <img src="./images/Close Icon.png" />
          </button>

          <form class="popup__form">
            <fieldset class="popup__fieldset">
              <h3 class="popup__title">Editar perfil</h3>

              <label class="popup__label">
                <input
                  type="text"
                  class="popup__name"
                  placeholder="nome"
                  required
                />
              </label>

              <label class="popup__label">
                <input
                  type="text"
                  class="popup__job"
                  placeholder="Sobre mim"
                  required
                />
              </label>

              <button type="submit" class="popup__button-save">
                <h3 class="popup__button-text">Salvar</h3>
              </button>
            </fieldset>
          </form>
        </div>
      </div>

      <footer>
        <p class="footer__text">© 2024 Around The U.S.</p>
      </footer>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
